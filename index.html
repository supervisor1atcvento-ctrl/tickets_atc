<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vento - Dashboard Dinámico</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --vento-orange: #FF5A00; /* Naranja Vento */
            --vento-black: #111111;  /* Negro Intenso */
            --vento-gray: #F8F9FA;   /* Fondo Claro */
            --vento-white: #FFFFFF;  /* Blanco */
            --vento-dark-gray: #222222;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--vento-gray);
            margin: 0;
            color: var(--vento-black);
        }

        header {
            background-color: var(--vento-black);
            color: var(--vento-white);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--vento-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        header h1 {
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            margin: 25px auto;
        }

        /* Filtros */
        .filters-section {
            background: var(--vento-white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e1e1;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 1px;
        }

        select {
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            min-width: 180px;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.3s;
        }

        select:focus {
            border-color: var(--vento-orange);
        }

        /* KPIs */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--vento-white);
            padding: 25px 20px;
            border-radius: 8px;
            border-top: 4px solid var(--vento-black);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.2s;
            border: 1px solid #e1e1e1;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            border-top-color: var(--vento-orange);
        }

        .kpi-card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-card p {
            margin: 12px 0 0;
            font-size: 2rem;
            font-weight: 900;
            color: var(--vento-black);
        }

        /* Gráficas */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }

        .chart-box {
            background: var(--vento-white);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e1e1;
        }

        .chart-box h4 {
            margin-top: 0;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
            color: var(--vento-black);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--vento-black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-weight: 700;
            color: var(--vento-white);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--vento-dark-gray);
            border-top: 5px solid var(--vento-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    CONECTANDO CON DRIVE...
</div>

<header>
    <h1>VENTO <span style="color:var(--vento-orange)">DATA ANALYTICS</span></h1>
    <span style="font-weight: 300; font-size: 0.9rem;">Actualización en Tiempo Real</span>
</header>

<div class="container">
    <div class="filters-section">
        <div class="filter-group">
            <label>FILTRAR CATEGORÍA</label>
            <select id="filterCategory" onchange="updateDashboard()">
                <option value="all">Todas las Categorías</option>
            </select>
        </div>
    </div>

    <div class="kpi-container">
        <div class="kpi-card">
            <h3>Total Registros</h3>
            <p id="kpiTotal">0</p>
        </div>
        <div class="kpi-card">
            <h3>Monto Total</h3>
            <p id="kpiSuma" style="color: var(--vento-orange);">$0</p>
        </div>
        <div class="kpi-card">
            <h3>Promedio General</h3>
            <p id="kpiPromedio">$0</p>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-box">
            <h4>Distribución por Categoría</h4>
            <div style="position: relative; height:320px;">
                <canvas id="chartPie"></canvas>
            </div>
        </div>
        <div class="chart-box">
            <h4>Historial / Tendencia de Valores</h4>
            <div style="position: relative; height:320px;">
                <canvas id="chartLine"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Configuración del enlace público de tu Google Sheet
    const SHEET_ID = '1JBre4cLAbYiOJuYye_FGcsk5U_BIStDoAiCbV-B8WoA';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let rawData = [];
    let chartPie, chartLine;

    // Colores corporativos aplicados a las gráficas
    const vOrange = '#FF5A00';
    const vBlack = '#111111';
    const vWhite = '#FFFFFF';
    const chartPalette = ['#FF5A00', '#111111', '#444444', '#888888', '#CCCCCC', '#FF8440'];

    // 1. Extracción de datos desde Google Drive
    async function fetchData() {
        try {
            const response = await fetch(URL);
            const text = await response.text();
            // Limpieza del formato JSONP que devuelve la API de Google
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            const rows = json.table.rows;

            // Mapeo automático de los datos extraídos
            rawData = rows.map(row => ({
                fecha: row.c[0] ? row.c[0].f || row.c[0].v : 'S/F',
                categoria: row.c[1] ? row.c[1].v : 'Sin Categoría',
                valor: row.c[2] ? Number(row.c[2].v) : 0
            }));

            initDashboard();
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error("Error al conectar con Drive:", error);
            document.getElementById('loading').innerHTML = "<span style='color:#FF5A00'>Error de conexión.</span><br><small style='font-size:0.8rem;margin-top:10px;'>Asegúrate de que el archivo de Drive esté compartido como 'Cualquier persona con el enlace puede leer'.</small>";
        }
    }

    // 2. Inicialización de Componentes y Filtros
    function initDashboard() {
        // Extraer categorías únicas para poblar el selector de forma dinámica
        const categories = [...new Set(rawData.map(item => item.categoria))];
        const select = document.getElementById('filterCategory');
        
        categories.forEach(cat => {
            if(cat) {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerHTML = cat;
                select.appendChild(opt);
            }
        });

        setupCharts();
        updateDashboard();
    }

    // 3. Configuración Inicial de Chart.js con la identidad de Vento
    function setupCharts() {
        const ctxPie = document.getElementById('chartPie').getContext('2d');
        chartPie = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    backgroundColor: chartPalette,
                    borderWidth: 2,
                    borderColor: vWhite,
                    data: []
                }]
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        const ctxLine = document.getElementById('chartLine').getContext('2d');
        chartLine = new Chart(ctxLine, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Registros',
                    borderColor: vBlack,
                    backgroundColor: vOrange,
                    borderWidth: 1,
                    data: []
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    // 4. Procesamiento de Filtros Dinámicos y Actualización Masiva
    function updateDashboard() {
        const catFilter = document.getElementById('filterCategory').value;
        
        // Aplicar filtro analítico
        let filtered = rawData;
        if(catFilter !== 'all') {
            filtered = rawData.filter(d => d.categoria === catFilter);
        }

        // Procesamiento de KPIs
        const total = filtered.length;
        const suma = filtered.reduce((acc, curr) => acc + (curr.valor || 0), 0);
        const promedio = total > 0 ? (suma / total) : 0;

        // Renderizado de KPIs en pantalla
        document.getElementById('kpiTotal').innerText = total.toLocaleString();
        document.getElementById('kpiSuma').innerText = '$' + suma.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('kpiPromedio').innerText = '$' + promedio.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Agrupación dinámica para Gráfica de Dona
        const counts = {};
        filtered.forEach(d => counts[d.categoria] = (counts[d.categoria] || 0) + 1);
        chartPie.data.labels = Object.keys(counts);
        chartPie.data.datasets[0].data = Object.values(counts);
        chartPie.update();

        // Mapeo dinámico para Gráfica de Barras (Muestra los últimos 12 registros de la lista)
        const muestraTendencia = filtered.slice(-12);
        chartLine.data.labels = muestraTendencia.map(d => d.fecha);
        chartLine.data.datasets[0].data = muestraTendencia.map(d => d.valor);
        chartLine.update();
    }

    // Ejecución inmediata al cargar la interfaz
    fetchData();
</script>

</body>
</html>
