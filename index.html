<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vento - Control de Tickets Abiertos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --vento-orange: #FF5A00; 
            --vento-black: #111111;  
            --vento-gray: #F8F9FA;   
            --vento-white: #FFFFFF;  
            --vento-dark-gray: #222222;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--vento-gray);
            margin: 0;
            color: var(--vento-black);
        }

        header {
            background-color: var(--vento-black);
            color: var(--vento-white);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--vento-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        header h1 {
            margin: 0;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .container {
            width: 93%;
            margin: 25px auto;
        }

        /* Filtros */
        .filters-section {
            background: var(--vento-white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e1e1;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 1px;
        }

        select {
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
            min-width: 220px;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.3s;
        }

        select:focus {
            border-color: var(--vento-orange);
        }

        /* KPIs */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--vento-white);
            padding: 25px 20px;
            border-radius: 8px;
            border-top: 4px solid var(--vento-black);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid #e1e1e1;
        }

        .kpi-card h3 {
            margin: 0;
            font-size: 0.8rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-card p {
            margin: 12px 0 0;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--vento-black);
        }

        /* Gráficas */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }

        .chart-box {
            background: var(--vento-white);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e1e1;
        }

        .chart-box h4 {
            margin-top: 0;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
            color: var(--vento-black);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--vento-black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-weight: 700;
            color: var(--vento-white);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--vento-dark-gray);
            border-top: 5px solid var(--vento-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    CONECTANDO CON BASE DE TICKETS VENTO...
</div>

<header>
    <h1>VENTO <span style="color:var(--vento-orange)">TICKETS BD</span></h1>
    <span style="font-weight: 300; font-size: 0.9rem;">Productividad y Control de Abiertos</span>
</header>

<div class="container">
    <div class="filters-section">
        <div class="filter-group">
            <label>FILTRAR POR ASESOR</label>
            <select id="filterAsesor" onchange="updateDashboard()">
                <option value="all">Todos los Asesores</option>
            </select>
        </div>
        <div class="filter-group">
            <label>FILTRAR POR MES (CREACIÓN)</label>
            <select id="filterMes" onchange="updateDashboard()">
                <option value="all">Todos los Meses</option>
            </select>
        </div>
    </div>

    <div class="kpi-container">
        <div class="kpi-card" style="border-top-color: var(--vento-orange);">
            <h3>Tickets Abiertos / Pendientes</h3>
            <p id="kpiAbiertos" style="color: var(--vento-orange);">0</p>
        </div>
        <div class="kpi-card">
            <h3>Total General Tickets</h3>
            <p id="kpiTotal">0</p>
        </div>
        <div class="kpi-card">
            <h3>Porcentaje Pendiente</h3>
            <p id="kpiPorcentaje">0%</p>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-box">
            <h4>Distribución de Estados (Columna G)</h4>
            <div style="position: relative; height:340px;">
                <canvas id="chartPie"></canvas>
            </div>
        </div>
        <div class="chart-box">
            <h4>Volumen de Tickets por Asesor (Columna C)</h4>
            <div style="position: relative; height:340px;">
                <canvas id="chartAsesores"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '1JBre4cLAbYiOJuYye_FGcsk5U_BIStDoAiCbV-B8WoA';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let rawData = [];
    let chartPie, chartAsesores;

    const vOrange = '#FF5A00';
    const vBlack = '#111111';
    const vWhite = '#FFFFFF';
    const chartPalette = ['#FF5A00', '#111111', '#555555', '#888888', '#AAAAAA', '#CCCCCC'];

    const mesesNombres = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    // 1. Obtener y estructurar datos desde Google Drive
    async function fetchData() {
        try {
            const response = await fetch(URL);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            const rows = json.table.rows;

            rawData = rows.map(row => {
                let mesTexto = 'S/M';
                
                // Procesar Fecha de Creación (Columna D -> Índice 3) para extraer el Mes
                if (row.c[3] && row.c[3].f) {
                    const fechaTexto = row.c[3].f.trim(); // "2026-03-01 09:37:45 AM"
                    
                    // Extraemos la parte de la fecha antes del espacio ("2026-03-01")
                    const soloFecha = fechaTexto.split(' ')[0]; 
                    
                    // Dividimos por el guion largo o corto "-"
                    const partes = soloFecha.split('-');
                    
                    if(partes.length >= 3) {
                        // El formato YYYY-MM-DD guarda el mes en el índice 1 (partes[1])
                        let m = parseInt(partes[1], 10) - 1;
                        if(mesesNombres[m]) mesTexto = mesesNombres[m];
                    }
                }

                return {
                    asesor: row.c[2] ? row.c[2].v.toString().trim() : 'Sin Asesor', // Columna C -> Índice 2
                    mesLabel: mesTexto,
                    estado: row.c[6] ? row.c[6].v.toString().trim() : 'Sin Estado'   // Columna G -> Índice 6
                };
            });

            initDashboard();
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            console.error("Error al procesar los datos:", error);
            document.getElementById('loading').innerHTML = "<span style='color:#FF5A00'>Error de Estructura.</span><br><small style='font-size:0.8rem;color:#fff;'>Verifica los permisos de lectura de la hoja de cálculo.</small>";
        }
    }

    // 2. Inicializar Selectores Dinámicos
    function initDashboard() {
        // Cargar menú desplegable de Asesores únicos
        const asesores = [...new Set(rawData.map(item => item.asesor))].sort();
        const selectAsesor = document.getElementById('filterAsesor');
        asesores.forEach(as => {
            if(as) {
                const opt = document.createElement('option');
                opt.value = as; opt.innerHTML = as;
                selectAsesor.appendChild(opt);
            }
        });

        // Cargar menú desplegable de Meses detectados
        const meses = [...new Set(rawData.map(item => item.mesLabel))].filter(m => m !== 'S/M');
        const selectMes = document.getElementById('filterMes');
        meses.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.innerHTML = m;
            selectMes.appendChild(opt);
        });

        setupCharts();
        updateDashboard();
    }

    // 3. Configuración de Gráficas de Conteo Puro
    function setupCharts() {
        const ctxPie = document.getElementById('chartPie').getContext('2d');
        chartPie = new Chart(ctxPie, {
            type: 'doughnut',
            data: { labels: [], datasets: [{ backgroundColor: chartPalette, borderWidth: 2, borderColor: vWhite, data: [] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        const ctxAsesores = document.getElementById('chartAsesores').getContext('2d');
        chartAsesores = new Chart(ctxAsesores, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Total Tickets', backgroundColor: vOrange, borderColor: vBlack, borderWidth: 1, data: [] }] },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                indexAxis: 'y', 
                scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } 
            }
        });
    }

    // 4. Lógica de Filtrado Dinámico y Renderizado de Totales
    function updateDashboard() {
        const selAsesor = document.getElementById('filterAsesor').value;
        const selMes = document.getElementById('filterMes').value;
        
        let filtered = rawData;
        if(selAsesor !== 'all') filtered = filtered.filter(d => d.asesor === selAsesor);
        if(selMes !== 'all') filtered = filtered.filter(d => d.mesLabel === selMes);

        const estadosContador = {};
        let totalAbiertos = 0;

        filtered.forEach(d => {
            let est = d.estado;
            estadosContador[est] = (estadosContador[est] || 0) + 1;
            
            if(est.toLowerCase() === 'abierto' || est.toLowerCase() === 'open' || est.toLowerCase() === 'pendiente') {
                totalAbiertos++;
            }
        });

        const totalTickets = filtered.length;
        const porcentaje = totalTickets > 0 ? ((totalAbiertos / totalTickets) * 100).toFixed(1) : 0;

        document.getElementById('kpiAbiertos').innerText = totalAbiertos.toLocaleString();
        document.getElementById('kpiTotal').innerText = totalTickets.toLocaleString();
        document.getElementById('kpiPorcentaje').innerText = porcentaje + '%';

        chartPie.data.labels = Object.keys(estadosContador);
        chartPie.data.datasets[0].data = Object.values(estadosContador);
        chartPie.update();

        const asesoresContador = {};
        filtered.forEach(d => {
            asesoresContador[d.asesor] = (asesoresContador[d.asesor] || 0) + 1;
        });

        const asesoresOrdenados = Object.keys(asesoresContador).sort((a,b) => asesoresContador[b] - asesoresContador[a]);

        chartAsesores.data.labels = asesoresOrdenados;
        chartAsesores.data.datasets[0].data = asesoresOrdenados.map(as => asesoresContador[as]);
        chartAsesores.update();
    }

    fetchData();
</script>

</body>
</html>
